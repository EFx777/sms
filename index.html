<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open SMS</title>
</head>
<body>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code") || "";
  const number = "888222";

  window.location.href = `sms:${number}?body=${encodeURIComponent(code)}`;
</script>

<p>If nothing happens, tap below:</p>
<a id="manual">Open SMS</a>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code") || "";
  const number = "888222";
  document.getElementById("manual").href =
    `sms:${number}?body=${encodeURIComponent(code)}`;
</script>

</body>
</html>
